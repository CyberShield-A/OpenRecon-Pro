---
- name: Post-déploiement Op---
- name: Post-déploiement OpenRecon
  hosts: localhost
  connection: local
  tasks:
    - name: Attendre que le port 8081 réponde
      wait_for:
        port: 8081
        delay: 5
        timeout: 60

    - name: Vérifier l'accès HTTP
      uri:
        url: "http://localhost:8081"
        status_code: 200
