- name: Attendre que l'application soit prête
      wait_for:
        port: 8081
        delay: 10 # On attend 10s que le serveur Python charge
        timeout: 60

    - name: Vérifier l'accès HTTP
      uri:
        url: "http://localhost:8081"
        status_code: 200
      register: web_check
      until: web_check.status == 200
      retries: 5 # On réessaie 5 fois si jamais c'est un peu lent
      delay: 5
